services:
    django:
        build: .
        container_name: talent-matching-django
        depends_on:
            - redis
            - neo4j
        env_file: .env
        ports:
            - "8000:8000"
        restart: always
        develop:
            watch:
                - action: sync
                  path: .
                  target: /app
                  ignore:
                      - "**/__pycache__/"
                      - "**/*.pyc"
                      - "**/migrations/"
                - action: rebuild
                  path: requirements.txt

    celery:
        build: .
        container_name: talent-matching-celery
        depends_on:
            - redis
            - django
        env_file: .env
        command: celery -A talent_matching_server worker --loglevel=info
        restart: always
        develop:
            watch:
                - action: sync
                  path: .
                  target: /app
                  ignore:
                      - "**/__pycache__/"
                      - "**/*.pyc"

    redis:
        image: redis:latest
        container_name: talent-matching-redis
        ports:
            - "6379:6379"
        restart: always

    neo4j:
        image: neo4j:5.10
        container_name: talent-matching-neo4j
        ports:
            - "7474:7474" # Neo4j Browser
            - "7687:7687" # Bolt Protocol (Django pakai ini)
        environment:
            NEO4J_AUTH: neo4j/12345678
        volumes:
            - neo4j_data:/data
            - neo4j_logs:/logs
        restart: always

volumes:
    neo4j_data:
    neo4j_logs:
